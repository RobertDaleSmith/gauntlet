# fly.toml — deploy with: fly launch --copy-config --now  (then `fly deploy`)
app = "gauntlet-harness"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[env]
  PORT = "8000"
