    .pass { color:#34D399; } .fail { color:#FF4D4D; } .alarm { color:#FFB020; }
  </style>
</head>

    <div class="game">

      <h2>Checkpoints</h2><div id="checkpoints">—</div>
      <h2>Alarms</h2><div id="alarms">—</div>
      <h2>Guardrails</h2><div id="guardrails">—</div>
    </div>
  </div>
